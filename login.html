<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | D2 Invest - Professional Wealth Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        :root { 
            --primary: #10b981; 
            --primary-dark: #059669;
            --secondary: #0f172a; 
            --text-main: #1e293b;
            --text-sub: #64748b;
            --input-border: #e2e8f0;
        }

        body { 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #fbfcfd;
        }

        /* --- Navigation --- */
        nav { 
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            padding: 18px 8%; 
            background: #ffffff;
            border-bottom: 1px solid #eee;
        }
        
        .brand { display: flex; align-items: center; text-decoration: none; }
        .brand img {
            height: 48px;
            width: 48px; 
            border-radius: 50%; 
            object-fit: cover;
            border: 2px solid var(--primary);
            margin-right: 12px;
        }
        .brand h1 { 
            font-size: 1.5rem; 
            font-weight: 800; 
            color: var(--secondary);
            letter-spacing: -1px;
        }
        .brand span { color: var(--primary); }

        /* --- Split Layout --- */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-split {
            display: flex;
            width: 95%;
            max-width: 1000px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
            overflow: hidden;
            border: 1px solid #f1f5f9;
        }

        .auth-welcome {
            flex: 1;
            background-color: var(--secondary);
            color: #ffffff;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-welcome h2 { font-size: 2.2rem; font-weight: 800; margin-bottom: 15px; }
        .auth-welcome p { font-size: 1.1rem; opacity: 0.8; line-height: 1.6; }

        .auth-card {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-header { margin-bottom: 35px; }
        .auth-header h2 { font-size: 1.8rem; color: var(--secondary); font-weight: 800; }

        /* --- Form --- */
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px;
            border: 1.5px solid var(--input-border);
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.25s;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 8px 15px rgba(16, 185, 129, 0.2);
        }

        .btn-submit:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            color: var(--text-sub);
            font-size: 0.95rem;
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        /* --- Error Box --- */
        #error-msg {
            color: #ef4444;
            background: #fee2e2;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        @media (max-width: 900px) {
            .auth-welcome { display: none; }
            .auth-card { padding: 40px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="brand">
            <img src="d2 logo.png" alt="D2 Logo">
            <h1>D2 <span>Invest</span></h1>
        </a>
    </nav>

    <div class="main-container">
        <div class="auth-split">
            <div class="auth-welcome">
                <h2>Welcome Back!</h2>
                <p>Log in to manage your professional portfolio and track your investment growth in real-time.</p>
            </div>

            <div class="auth-card">
                <div class="auth-header">
                    <h2>Login to Account</h2>
                    <p>Enter your credentials to continue.</p>
                </div>

                <div id="error-msg"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" placeholder="name@company.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">Secure Login</button>
                </form>

                <p class="footer-text">
                    New to D2 Invest? <a href="signup.html">Create New Account</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHjoV-8VeURo26qpor9b_ED41h3uATgG8",
            authDomain: "d2-invest.firebaseapp.com",
            projectId: "d2-invest",
            storageBucket: "d2-invest.firebasestorage.app",
            messagingSenderId: "809739613599",
            appId: "1:809739613599:web:1415d8dc12c0d82f8af9aa",
            measurementId: "G-SDKNQSC05G"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- BRAHMASTRA: Purana session clean karne ke liye ---
        signOut(auth).then(() => {
            localStorage.clear();
            sessionStorage.clear();
            console.log("Purana ghost session clear ho gaya.");
        }).catch((err) => console.log("Signout error:", err));

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            submitBtn.innerText = "Authenticating...";

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "home.html"; 
            } catch (error) {
                errorMsg.innerText = "Invalid credentials. Please try again.";
                errorMsg.style.display = 'block';
                submitBtn.innerText = "Secure Login";
            }
        });
    </script>
</body>
</html>
