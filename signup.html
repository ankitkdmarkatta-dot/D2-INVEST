<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | D2 Invest - Professional Wealth Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        :root { 
            --primary: #10b981; /* Corporate Emerald */
            --primary-dark: #059669;
            --secondary: #0f172a; /* Deep Navy */
            --text-main: #1e293b;
            --text-sub: #64748b;
            --input-border: #e2e8f0;
            --input-bg: #f8fafc;
        }

        body { 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #fbfcfd;
            overflow-x: hidden;
        }

        /* --- Corporate Navigation --- */
        nav { 
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            padding: 18px 8%; 
            background: #ffffff;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #eee;
        }
        
        .brand { display: flex; align-items: center; text-decoration: none; }
        .brand img {
            height: 48px;
            width: 48px; 
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.15);
            margin-right: 12px;
        }
        .brand h1 { 
            font-size: 1.5rem; 
            font-weight: 800; 
            color: var(--secondary);
            letter-spacing: -1px;
        }
        .brand span { color: var(--primary); }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f9fbfd;
        }

        .auth-split {
            display: flex;
            width: 90%;
            max-width: 1000px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.06);
            overflow: hidden;
            border: 1px solid #f1f5f9;
        }

        .auth-welcome {
            flex: 1;
            background-color: var(--secondary);
            color: #ffffff;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .auth-welcome h2 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 15px;
            line-height: 1.2;
        }
        
        .auth-welcome p {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .auth-welcome img.welcome-image {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-top: auto;
        }

        .auth-card {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-header { margin-bottom: 40px; text-align: left; }
        .auth-header h2 { font-size: 1.8rem; color: var(--secondary); font-weight: 800; letter-spacing: -1px; }
        .auth-header p { color: var(--text-sub); font-size: 0.95rem; margin-top: 5px; }

        .form-group { margin-bottom: 22px; position: relative; }
        
        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px 18px;
            background: #fff;
            border: 1.5px solid var(--input-border);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--secondary);
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
            outline: none;
        }
        
        .referral-box {
            background: #fdfdfd !important;
            border: 2px dashed var(--input-border) !important;
            font-weight: 700 !important;
            letter-spacing: 0.5px;
            color: var(--primary) !important;
        }

        .btn-submit {
            width: 100%;
            padding: 17px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            margin-top: 15px;
            position: relative;
            box-shadow: 0 8px 15px -3px rgba(16, 185, 129, 0.3);
        }

        .btn-submit:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -3px rgba(16, 185, 129, 0.4);
        }
        
        .footer-text {
            text-align: center;
            margin-top: 35px;
            color: var(--text-sub);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        #error-msg {
            color: #ef4444;
            background: #fee2e2;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 25px;
            border: 1px solid #fecaca;
            display: none;
            text-align: center;
        }

        @media (max-width: 900px) {
            .auth-welcome { display: none; }
            .auth-split { max-width: 500px; width: 100%; margin: 40px 0; }
            .auth-card { padding: 40px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="brand">
            <img src="d2 logo.png" alt="D2 Logo"> <h1>D2 <span>Invest</span></h1>
        </a>
    </nav>

    <div class="main-container">
        <div class="auth-split">
            <div class="auth-welcome">
                <div>
                    <h2>Secure Your<br>Financial Future</h2>
                    <p>Unlock professional wealth management tools and personalized investment strategies with D2 Invest.</p>
                </div>
                <img src="https://cdn.pixabay.com/photo/2021/04/24/09/25/stock-market-6203649_1280.png" alt="Investment Chart" class="welcome-image">
            </div>

            <div class="auth-card">
                <div class="auth-header">
                    <h2>Get Started</h2>
                    <p>Create your professional portfolio in minutes.</p>
                </div>

                <div id="error-msg"></div>

                <form id="signupForm">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <div class="input-wrapper">
                            <input type="text" id="fullName" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" placeholder="name@company.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Create Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="Minimum 8 characters" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Referral ID (Optional)</label>
                        <div class="input-wrapper">
                            <input type="text" id="referral" class="referral-box" placeholder="D2-CODE">
                        </div>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">Create Professional Account</button>
                </form>

                <p class="footer-text">
                    Already a member? <a href="login.html">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDHjoV-8VeURo26qpor9b_ED41h3uATgG8",
            authDomain: "d2-invest.firebaseapp.com",
            projectId: "d2-invest",
            storageBucket: "d2-invest.firebasestorage.app",
            messagingSenderId: "809739613599",
            appId: "1:809739613599:web:1415d8dc12c0d82f8af9aa",
            measurementId: "G-SDKNQSC05G"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 1. Auto-fill Referral ID from URL ---
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if (refCode) {
                document.getElementById('referral').value = refCode.toUpperCase();
                document.getElementById('referral').readOnly = true; // Taaki koi change na kare
            }
        });

        const signupForm = document.getElementById('signupForm');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submitBtn');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const referredBy = document.getElementById('referral').value.trim().toUpperCase();

            if (password !== confirmPass) {
                showError("Passwords do not match!");
                return;
            }

            if (password.length < 6) {
                showError("Password should be at least 6 characters.");
                return;
            }

            submitBtn.innerText = "Creating Account...";
            submitBtn.disabled = true;

            try {
                // 2. Create User in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 3. Generate Unique Referral Code for this new user
                const myRefCode = user.uid.substring(0, 8).toUpperCase();

                // 4. Create User Document in Firestore
                await setDoc(doc(db, "users", user.uid), {
                    fullName: fullName,
                    email: email,
                    uid: user.uid,
                    balance: 0,
                    totalEarnings: 0,
                    myReferralCode: myRefCode,
                    referredBy: referredBy || null,
                    claimedReferrals: [],
                    activePlans: [], // Referral reward tabhi milega jab list empty nahi hogi
                    createdAt: new Date().toISOString()
                });

                submitBtn.innerText = "Success! Redirecting...";
                alert("Account created successfully!");
                window.location.href = "login.html"; 
                
            } catch (error) {
                console.error(error);
                let cleanError = error.message.replace("Firebase: ", "");
                showError(cleanError);
                submitBtn.innerText = "Create Professional Account";
                submitBtn.disabled = false;
            }
        });

        function showError(text) {
            errorMsg.innerText = text;
            errorMsg.style.display = 'block';
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
