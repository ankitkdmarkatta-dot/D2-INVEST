<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invest | D2 INVEST</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-primary: #0047FF;
            --brand-dark: #0a0e14;
            --success: #10b981;
            --danger: #ef4444;
            --bg-light: #f4f7fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-light); padding-bottom: 100px; color: #1e293b; }

        header {
            background: #fff; padding: 15px 20px; display: flex; align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 1000;
        }
        .logo-img { width: 38px; height: 38px; border-radius: 8px; margin-right: 12px; object-fit: cover; }
        .brand-name { font-weight: 800; font-size: 20px; color: var(--brand-dark); }

        .tab-container { display: flex; gap: 10px; padding: 20px 15px; max-width: 500px; margin: 0 auto; }
        .tab-btn {
            flex: 1; padding: 14px; border: none; border-radius: 12px;
            font-weight: 700; cursor: pointer; background: #e2e8f0; color: #64748b;
        }
        .tab-btn.active { background: var(--brand-primary); color: white; box-shadow: 0 4px 15px rgba(0, 71, 255, 0.2); }

        .plans-grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 0 15px; max-width: 500px; margin: 0 auto; }
        
        .plan-card {
            background: white; border-radius: 28px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02);
        }
        .plan-img-box { position: relative; height: 180px; background: #eee; }
        .plan-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .price-tag { 
            position: absolute; bottom: 15px; left: 15px; background: var(--brand-primary); 
            color: white; padding: 6px 15px; border-radius: 10px; font-weight: 700;
        }

        .plan-content { padding: 20px; }
        .plan-title { font-size: 19px; font-weight: 800; color: #0f172a; margin-bottom: 8px; }
        .plan-desc { font-size: 12px; color: #64748b; line-height: 1.5; margin-bottom: 15px; }
        
        .mini-stats { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f8fafc; 
            padding: 15px; border-radius: 20px; margin-bottom: 15px;
        }
        .ms-item span { display: block; font-size: 10px; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
        .ms-item b { font-size: 14px; color: #1e293b; }

        .buy-btn {
            width: 100%; background: var(--brand-dark); border: none;
            padding: 16px; border-radius: 15px; font-weight: 700;
            color: white; cursor: pointer; font-size: 15px;
        }

        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: white; width: 100%; max-width: 380px;
            border-radius: 30px; padding: 25px; text-align: center;
        }
        .detail-list { text-align: left; margin: 20px 0; background: #f1f5f9; padding: 18px; border-radius: 20px; }
        .dl-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #cbd5e1; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: white; height: 75px; display: flex;
            justify-content: space-around; align-items: center;
            border-top: 1px solid #eee; z-index: 1000;
        }
        .nav-link { text-decoration: none; color: #94a3b8; text-align: center; font-size: 11px; font-weight: 600; }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-link.active { color: var(--brand-primary); }
    </style>
</head>
<body>

    <header>
        <img src="d2 logo.png" class="logo-img" alt="D2" onerror="this.src='https://via.placeholder.com/40'">
        <div class="brand-name">D2 INVEST</div>
    </header>

    <div class="tab-container">
        <button class="tab-btn active" onclick="showTab('buy')">Investment Plans</button>
        <button class="tab-btn" onclick="showTab('active')">My Portfolio</button>
    </div>

    <div id="buy-plans-section" class="plans-grid"></div>

    <div id="active-plans-section" style="display:none;">
        <div id="active-list" class="plans-grid"></div>
        <div id="no-active" style="text-align:center; padding:100px 20px; color:#94a3b8;">
            <p>Aapke paas koi active plan nahi hai.</p>
        </div>
    </div>

    <div class="modal" id="order-modal">
        <div class="modal-content">
            <h3 id="m-name" style="font-size:22px; font-weight:800;">Plan Breakdown</h3>
            <div class="detail-list">
                <div class="dl-row"><span>Invest Amount:</span><b id="m-price">₹0</b></div>
                <div class="dl-row"><span>Daily Profit:</span><b id="m-daily" style="color:var(--success);">₹0</b></div>
                <div class="dl-row"><span>Hourly Income:</span><b id="m-hourly">₹0</b></div>
                <div class="dl-row"><span>Total Returns:</span><b id="m-total">₹0</b></div>
                <div class="dl-row"><span>Validity:</span><b id="m-days">0 Days</b></div>
            </div>
            <button class="buy-btn" id="confirm-buy-btn" style="background:var(--brand-primary);">ACTIVATE NOW</button>
            <p onclick="closeModal()" style="margin-top:15px; color:var(--danger); font-weight:700; cursor:pointer;">Close</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-link"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="invest.html" class="nav-link active"><i class="fa-solid fa-chart-line"></i><span>Invest</span></a>
        <a href="refer.html" class="nav-link"><i class="fa-solid fa-users"></i><span>Refer</span></a>
        <a href="account.html" class="nav-link"><i class="fa-solid fa-user"></i><span>Account</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHjoV-8VeURo26qpor9b_ED41h3uATgG8",
            authDomain: "d2-invest.firebaseapp.com",
            projectId: "d2-invest",
            storageBucket: "d2-invest.firebasestorage.app",
            messagingSenderId: "809739613599",
            appId: "1:809739613599:web:1415d8dc12c0d82f8af9aa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let pData = {};

        // EXACT 24 PLANS IN SEQUENCE
        const planList = [
            { name: "Swiggy Starter", price: 350, total: 800, days: 8, img: "https://images.unsplash.com/photo-1590541336465-181534015f8a?w=500", desc: "Short term logistics." },
            { name: "Zomato Growth", price: 599, total: 1600, days: 14, img: "https://images.unsplash.com/photo-1563245372-f21724e3856d?w=500", desc: "Food delivery expansion." },
            { name: "Netflix Stream", price: 699, total: 1450, days: 10, img: "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=500", desc: "Digital content rights." },
            { name: "Cloud Server", price: 999, total: 2200, days: 12, img: "https://images.unsplash.com/photo-1587620962725-abab7fe55159?w=500", desc: "Technical infrastructure." },
            { name: "Tata Power 5G", price: 1200, total: 1200*2.3, days: 15, img: "https://images.unsplash.com/photo-1549495514-6997637841c7?w=500", desc: "2.3x High yield broadband." },
            { name: "Airtel Xstream", price: 1250, total: 1250*2.3, days: 15, img: "https://images.unsplash.com/photo-1520869562399-e772f042f422?w=500", desc: "Fiber optic investment." },
            { name: "Jio Fiber Max", price: 1300, total: 1300*2.3, days: 15, img: "https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?w=500", desc: "Satellite internet project." },
            { name: "Adani Green X", price: 1400, total: 1400*2.3, days: 15, img: "https://images.unsplash.com/photo-1509391366360-2e959784a276?w=500", desc: "Solar grid fund." },
            { name: "Reliance Jio", price: 1500, total: 3800, days: 15, img: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=500", desc: "5G network rollout." },
            { name: "Tesla Powerwall", price: 2200, total: 5800, days: 18, img: "https://images.unsplash.com/photo-1539139560574-df99d214f854?w=500", desc: "Battery tech research." },
            { name: "Amazon Ware", price: 2800, total: 7500, days: 20, img: "https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=500", desc: "E-commerce logistics." },
            { name: "Apple M3 Chip", price: 3500, total: 10000, days: 22, img: "https://images.unsplash.com/photo-1611186871348-b1ec696e52c9?w=500", desc: "Chip manufacturing." },
            { name: "Nvidia GPU Hub", price: 4200, total: 12500, days: 24, img: "https://images.unsplash.com/photo-1591488320449-011701bb6704?w=500", desc: "AI compute processing." },
            { name: "Bitcoin Vault", price: 5000, total: 15500, days: 25, img: "https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=500", desc: "Crypto mining node." },
            { name: "Starlink Space", price: 5800, total: 18000, days: 28, img: "https://images.unsplash.com/photo-1516849841032-87cbac4d88f7?w=500", desc: "Low orbit satellite." },
            { name: "SpaceX Mars", price: 6500, total: 21000, days: 30, img: "https://images.unsplash.com/photo-1517976487492-5750f3195933?w=500", desc: "Rocket propulsion." },
            { name: "Meta VR Core", price: 7200, total: 24000, days: 32, img: "https://images.unsplash.com/photo-1622979135225-d2ba269cf1ac?w=500", desc: "Metaverse development." },
            { name: "Gold Standard", price: 8000, total: 28000, days: 35, img: "https://images.unsplash.com/photo-1589118949245-7d38baf380d6?w=500", desc: "Safe haven asset." },
            { name: "Hydrogen Hub", price: 8800, total: 32000, days: 38, img: "https://images.unsplash.com/photo-1634467524884-897d0af5e104?w=500", desc: "Clean energy plant." },
            { name: "Adani Wind", price: 9500, total: 36000, days: 40, img: "https://images.unsplash.com/photo-1466611653911-954ffea1127b?w=500", desc: "Wind turbine farm." },
            { name: "Microsoft AI", price: 10500, total: 42000, days: 45, img: "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=500", desc: "AI software cycle." },
            { name: "Google Quantum", price: 12000, total: 50000, days: 50, img: "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=500", desc: "Quantum research lab." },
            { name: "Diamond Mine", price: 15000, total: 65000, days: 60, img: "https://images.unsplash.com/photo-1588615419957-550e5041f021?w=500", desc: "Resource extraction." },
            { name: "D2 Legacy", price: 20000, total: 100000, days: 75, img: "https://images.unsplash.com/photo-1454165833767-1246991901a1?w=500", desc: "Elite wealth fund." }
        ];

        function renderPlans() {
            const container = document.getElementById('buy-plans-section');
            planList.sort((a,b) => a.price - b.price).forEach((p) => {
                const daily = (p.total / p.days).toFixed(2);
                container.innerHTML += `
                    <div class="plan-card">
                        <div class="plan-img-box">
                            <span class="price-tag">₹${p.price}</span>
                            <img src="${p.img}" onerror="this.src='https://via.placeholder.com/500x180/0047FF/FFFFFF?text=${p.name}'">
                        </div>
                        <div class="plan-content">
                            <div class="plan-title">${p.name}</div>
                            <div class="mini-stats">
                                <div class="ms-item"><span>Daily</span><b style="color:var(--success);">₹${daily}</b></div>
                                <div class="ms-item"><span>Days</span><b>${p.days}d</b></div>
                            </div>
                            <button class="buy-btn" onclick="openModal('${p.name}', ${p.price}, ${daily}, ${p.days}, ${p.total})">DETAILS</button>
                        </div>
                    </div>`;
            });
        }
        renderPlans();

        window.openModal = (name, price, daily, days, total) => {
            pData = { name, price, daily, days, total };
            document.getElementById('m-name').innerText = name;
            document.getElementById('m-price').innerText = "₹" + price;
            document.getElementById('m-daily').innerText = "₹" + daily;
            document.getElementById('m-hourly').innerText = "₹" + (daily/24).toFixed(2);
            document.getElementById('m-total').innerText = "₹" + Math.round(total);
            document.getElementById('m-days').innerText = days + " Days";
            document.getElementById('order-modal').style.display = 'flex';
        }

        window.closeModal = () => { document.getElementById('order-modal').style.display = 'none'; }

        document.getElementById('confirm-buy-btn').onclick = async () => {
            if (!currentUser) return;
            const btn = document.getElementById('confirm-buy-btn');
            btn.disabled = true; btn.innerText = "Checking...";

            try {
                const userRef = doc(db, "users", currentUser.uid);
                const snap = await getDoc(userRef);
                const userData = snap.data();

                if ((userData.balance || 0) >= pData.price) {
                    await updateDoc(userRef, {
                        balance: increment(-pData.price),
                        totalInvested: increment(pData.price),
                        activePlans: arrayUnion({ 
                            name: pData.name, 
                            daily: parseFloat(pData.daily), 
                            days: pData.days,
                            purchaseDate: new Date().toISOString()
                        })
                    });
                    alert("Success!"); closeModal();
                } else { alert("Balance low!"); }
            } catch (e) { alert("Error"); }
            btn.disabled = false; btn.innerText = "ACTIVATE NOW";
        }

        onAuthStateChanged(auth, (u) => { if(u) currentUser = u; else window.location.href="login.html"; });

        window.showTab = (tab) => {
            document.getElementById('buy-plans-section').style.display = tab === 'buy' ? 'grid' : 'none';
            document.getElementById('active-plans-section').style.display = tab === 'active' ? 'block' : 'none';
        };
    </script>
</body>
</html>
